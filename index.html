<style>
  :root{
    --ink:#20232e;
    --muted:#767c94;
    --border:#e7e8f3;
    --surface:#f6f7fc;
    --card:#ffffff;

    --success:#22c55e;
    --success-dark:#159648;
    --danger:#f43f5e;
    --danger-dark:#c81e42;
    --warning:#f59e0b;
    --warning-dark:#b45309;
    --info:#3b82f6;
    --info-dark:#2563eb;
    --highlight:#ec4899;
    --highlight-dark:#c2277a;

    /* Fixed brand colors for the three subjects (used on the neutral home screen) */
    --spelling-color:#6366f1;
    --spelling-soft:#eef0ff;
    --times-color:#f59e0b;
    --times-soft:#fff6e5;
    --punct-color:#10b981;
    --punct-soft:#e8fbf3;

    /* Ambient background + primary accent: default (neutral) palette */
    --bg1:#14b8a6;
    --bg2:#7c3aed;
    --accent:#7c3aed;
    --accent-dark:#5b21b6;
    --accent-soft:#f1ecff;
  }
  body.theme-spelling{
    --bg1:#6366f1;
    --bg2:#a855f7;
    --accent:#6366f1;
    --accent-dark:#4338ca;
    --accent-soft:#eef0ff;
  }
  body.theme-times{
    --bg1:#f59e0b;
    --bg2:#fb7185;
    --accent:#f59e0b;
    --accent-dark:#b45309;
    --accent-soft:#fff6e5;
  }
  body.theme-punctuation{
    --bg1:#10b981;
    --bg2:#0ea5e9;
    --accent:#10b981;
    --accent-dark:#047857;
    --accent-soft:#e8fbf3;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI Rounded','Trebuchet MS','Segoe UI',Verdana,sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    color:var(--ink);
    position:relative;
    overflow-x:hidden;
    transition:background 0.4s;
  }
  body::before, body::after{
    content:'';
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    opacity:.32;
    z-index:0;
    transition:background 0.4s;
    pointer-events:none;
  }
  body::before{ top:-130px; left:-120px; width:320px; height:320px; background:var(--bg2); }
  body::after{ bottom:-150px; right:-110px; width:380px; height:380px; background:var(--bg1); }

  .card{
    background:var(--card);
    border-radius:28px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    width:100%;
    max-width:720px;
    padding:40px 40px 36px;
    position:relative;
    overflow:hidden;
    overflow-wrap:break-word;
    z-index:1;
  }
  .card::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:7px;
    background:linear-gradient(90deg,var(--bg1),var(--bg2));
  }
  .screen{ animation:screenIn .35s ease both; }
  @keyframes screenIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  h1{
    text-align:center;
    font-size:1.9em;
    line-height:1.15;
    margin:0 0 6px;
    padding:0 50px;
    color:var(--accent-dark);
  }
  .subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:28px;
    font-size:1.05em;
  }
  label{
    display:block;
    font-weight:bold;
    margin:18px 0 8px;
    font-size:1.05em;
    color:var(--ink);
  }
  input[type="text"].name-input{
    width:100%;
    padding:14px 16px;
    font-size:1.2em;
    border-radius:14px;
    border:3px solid var(--border);
    outline:none;
    font-family:inherit;
    transition:border-color .15s;
  }
  input[type="text"].name-input:focus{ border-color:var(--accent); }

  .mascot-row{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--surface);
    border-radius:20px;
    padding:14px 18px;
    margin:4px 0 26px;
  }
  .mascot-avatar{ width:84px; height:92px; flex-shrink:0; }
  .mascot-avatar svg{ width:100%; height:100%; display:block; }
  .speech-bubble{
    position:relative;
    background:#ffffff;
    border:3px solid var(--border);
    border-radius:16px;
    padding:12px 16px;
    font-size:0.95em;
    line-height:1.45;
    color:var(--ink);
  }
  .speech-bubble strong{ display:block; color:var(--accent-dark); font-size:1.15em; margin-bottom:2px; }
  .speech-bubble::before{
    content:'';
    position:absolute;
    left:-11px;
    top:50%;
    transform:translateY(-50%);
    border-width:8px 11px 8px 0;
    border-style:solid;
    border-color:transparent var(--border) transparent transparent;
  }
  .speech-bubble::after{
    content:'';
    position:absolute;
    left:-8px;
    top:50%;
    transform:translateY(-50%);
    border-width:7px 9px 7px 0;
    border-style:solid;
    border-color:transparent #ffffff transparent transparent;
  }

  .subject-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
    margin-top:10px;
  }
  .subject-card{
    background:var(--surface);
    border:3px solid var(--border);
    border-radius:20px;
    padding:22px 12px;
    text-align:center;
    cursor:pointer;
    transition:.15s;
    font-family:inherit;
  }
  .subject-card:hover{ transform:translateY(-3px); box-shadow:0 10px 22px rgba(0,0,0,0.1); }
  .subject-card.card-spelling:hover{ border-color:var(--spelling-color); }
  .subject-card.card-times:hover{ border-color:var(--times-color); }
  .subject-card.card-punctuation:hover{ border-color:var(--punct-color); }
  .subject-icon{
    font-size:1.9em;
    width:68px;
    height:68px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 12px;
  }
  .card-spelling .subject-icon{ background:var(--spelling-soft); }
  .card-times .subject-icon{ background:var(--times-soft); }
  .card-punctuation .subject-icon{ background:var(--punct-soft); }
  .subject-title{ font-size:1.1em; font-weight:bold; color:var(--ink); margin-bottom:4px; }
  .subject-desc{ font-size:0.78em; color:var(--muted); }

  .back-btn{
    background:#eaf2ff;
    color:var(--info-dark);
    border:2px solid #cfe0ff;
    border-radius:10px;
    padding:6px 14px;
    font-weight:bold;
    font-size:0.9em;
    font-family:inherit;
    cursor:pointer;
    margin-bottom:14px;
    transition:.15s;
  }
  .back-btn:hover{ background:#dcebff; }

  .step-dots{
    display:flex;
    justify-content:center;
    gap:9px;
    margin:2px 0 22px;
  }
  .step-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--border);
    transition:.2s;
  }
  .step-dot.done{ background:var(--accent); opacity:0.4; }
  .step-dot.active{ background:var(--accent); opacity:1; transform:scale(1.4); }
  .step-name-input{ text-align:center; font-size:1.4em; }

  .year-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }
  .year-btn{
    padding:16px 4px;
    border-radius:16px;
    border:3px solid var(--border);
    background:var(--surface);
    font-size:1.3em;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    color:var(--ink);
  }
  .year-btn:hover{ border-color:var(--accent); }
  .year-btn.selected{
    background:var(--accent);
    border-color:var(--accent-dark);
    color:white;
    transform:scale(1.06);
  }

  .table-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
  }
  .table-btn{
    padding:14px 2px;
    border-radius:14px;
    border:3px solid var(--border);
    background:var(--surface);
    font-size:1.05em;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    color:var(--ink);
  }
  .table-btn:hover{ border-color:var(--accent); }
  .table-btn.selected{
    background:var(--accent);
    border-color:var(--accent-dark);
    color:white;
    transform:scale(1.06);
  }
  .table-btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .table-btn:disabled:hover{ border-color:var(--border); }

  .op-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .op-btn{
    padding:14px 4px;
    border-radius:14px;
    border:3px solid var(--border);
    background:var(--surface);
    font-size:1em;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    color:var(--ink);
    line-height:1.4;
  }
  .op-btn.op-wide{ grid-column:1 / -1; }
  .op-btn:hover{ border-color:var(--highlight); }
  .op-btn.selected{
    background:var(--highlight);
    border-color:var(--highlight-dark);
    color:white;
    transform:scale(1.05);
  }
  .op-btn:disabled{ cursor:not-allowed; }

  .mode-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .mode-btn{
    width:100%;
    padding:16px;
    border-radius:16px;
    border:3px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    text-align:left;
    font-family:inherit;
    font-size:1em;
    transition:.15s;
  }
  .mode-btn strong{ display:block; font-size:1.15em; margin-bottom:4px;}
  .mode-btn small{ color:var(--muted); }
  .mode-btn.selected{
    border-color:var(--highlight);
    background:#fff0f7;
  }

  .big-btn{
    display:block;
    width:100%;
    margin-top:26px;
    padding:16px;
    font-size:1.3em;
    font-weight:bold;
    border:none;
    border-radius:16px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    transition:transform .08s, box-shadow .08s, filter .15s;
    box-shadow:0 5px 0 var(--accent-dark);
    font-family:inherit;
  }
  .big-btn:hover{ filter:brightness(1.06); }
  .big-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--accent-dark); }
  .big-btn:disabled{ background:#d3d5e0; box-shadow:0 5px 0 #b7b9c8; cursor:not-allowed; filter:none; }
  .big-btn.btn-success{ background:var(--success); box-shadow:0 5px 0 var(--success-dark); }
  .big-btn.btn-info{ background:var(--info); box-shadow:0 5px 0 var(--info-dark); }
  .big-btn.btn-warning{ background:var(--warning); color:var(--ink); box-shadow:0 5px 0 var(--warning-dark); }

  .link-btn{
    display:block;
    text-align:center;
    margin-top:16px;
    color:var(--accent-dark);
    font-weight:bold;
    cursor:pointer;
    background:none;
    border:none;
    font-size:1em;
    text-decoration:underline;
    width:100%;
  }

  /* ---- Quiz screen ---- */
  .quiz-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .level-pill{
    background:var(--accent-soft);
    color:var(--accent-dark);
    font-weight:bold;
    font-size:0.85em;
    padding:7px 14px;
    border-radius:999px;
    white-space:nowrap;
  }
  .score-pill{
    background:#fff7e0;
    color:#8a5a00;
    font-weight:bold;
    font-size:0.9em;
    padding:7px 14px;
    border-radius:999px;
    white-space:nowrap;
  }
  .exit-btn{
    background:#ffeaee;
    color:var(--danger-dark);
    border:2px solid #ffd2da;
    border-radius:10px;
    padding:6px 14px;
    font-weight:bold;
    font-size:0.9em;
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
    transition:.15s;
  }
  .exit-btn:hover{ background:#ffdbe2; }
  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .progress-bar-outer{
    flex:1;
    height:14px;
    background:var(--surface);
    border-radius:8px;
    overflow:hidden;
  }
  .progress-bar-inner{
    height:100%;
    background:var(--accent);
    transition:width .3s;
  }
  .progress-count{
    font-size:0.85em;
    font-weight:bold;
    color:var(--muted);
    white-space:nowrap;
  }
  .timer-bar-outer{
    height:10px;
    background:var(--surface);
    border-radius:8px;
    overflow:hidden;
    margin-bottom:22px;
  }
  .timer-bar-inner{
    height:100%;
    background:var(--danger);
    transition:width 1s linear;
  }
  .speak-btn{
    display:block;
    margin:18px auto 0;
    padding:10px 20px;
    border-radius:14px;
    border:2px solid var(--info);
    background:#eaf3ff;
    color:var(--info-dark);
    font-weight:bold;
    font-family:inherit;
    font-size:1em;
    cursor:pointer;
    transition:.15s;
  }
  .speak-btn:hover{ background:#dcebff; }
  .word-box{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:36px 0;
  }
  .letter-tile, .blank-tile{
    width:52px;
    height:60px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.8em;
    font-weight:bold;
    text-transform:lowercase;
  }
  .letter-tile{
    background:var(--accent-soft);
    color:var(--accent-dark);
  }
  .blank-tile input{
    width:100%;
    height:100%;
    border:3px solid var(--accent);
    border-radius:12px;
    text-align:center;
    font-size:1em;
    font-weight:bold;
    text-transform:lowercase;
    outline:none;
    font-family:inherit;
    transition:border-color .15s, background .15s;
  }
  .blank-tile input:focus{ border-color:var(--highlight); background:#fff5f9;}
  .equation-box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:36px 0;
    font-size:2.2em;
    font-weight:bold;
    color:var(--accent-dark);
    flex-wrap:wrap;
  }
  .equation-box .answer-input{
    width:110px;
    height:78px;
    border:3px solid var(--accent);
    border-radius:14px;
    text-align:center;
    font-size:0.85em;
    font-weight:bold;
    outline:none;
    font-family:inherit;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .equation-box .answer-input:focus{ border-color:var(--highlight); background:#fff5f9; }

  /* ---- Punctuation / capital-letter tap-to-choose questions ---- */
  .sentence-box{
    text-align:center;
    font-size:1.5em;
    font-weight:600;
    color:var(--ink);
    line-height:1.7;
    margin:30px 0 24px;
    padding:0 4px;
  }
  .sentence-blank{
    display:inline-block;
    min-width:30px;
    border-bottom:4px solid var(--accent);
    margin:0 2px;
  }
  .choice-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin:0 0 10px;
  }
  .choice-btn{
    padding:14px 20px;
    border-radius:14px;
    border:3px solid var(--border);
    background:var(--surface);
    font-size:1.3em;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    color:var(--ink);
    font-family:inherit;
    min-width:56px;
  }
  .choice-btn.word-chip{ font-size:1.05em; padding:10px 14px; min-width:0; }
  .choice-btn:hover{ border-color:var(--accent); }
  .choice-btn.selected{
    background:var(--accent);
    border-color:var(--accent-dark);
    color:white;
    transform:scale(1.06);
  }
  .choice-btn:disabled{ cursor:not-allowed; }
  .choice-btn.choice-correct{ background:var(--success); border-color:var(--success-dark); color:white; }
  .choice-btn.choice-wrong{ background:var(--danger); border-color:var(--danger-dark); color:white; }

  .feedback{
    text-align:center;
    font-size:1.3em;
    font-weight:bold;
    min-height:1.6em;
    margin-bottom:10px;
  }
  .feedback.correct{ color:var(--success-dark); animation:popIn .3s; }
  .feedback.wrong{ color:var(--danger-dark); }

  @keyframes popIn{
    0%{ transform:scale(0.7); opacity:0; }
    60%{ transform:scale(1.08); opacity:1; }
    100%{ transform:scale(1); }
  }
  @keyframes tilePop{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.14); }
    100%{ transform:scale(1); }
  }
  @keyframes tileShake{
    10%,90%{ transform:translateX(-2px); }
    20%,80%{ transform:translateX(4px); }
    30%,50%,70%{ transform:translateX(-7px); }
    40%,60%{ transform:translateX(7px); }
  }
  .tile-correct{ animation:tilePop .35s ease; }
  .tile-wrong{ animation:tileShake .45s ease; }

  .quiz-buttons{
    display:flex;
    gap:12px;
  }
  .quiz-buttons .big-btn{ margin-top:12px; }

  /* ---- Results ---- */
  .medal{
    width:104px;
    height:104px;
    border-radius:50%;
    margin:6px auto 4px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2.8em;
    box-shadow:0 6px 14px rgba(0,0,0,0.18);

<script>
/* ---------------- Word lists (UK National Curriculum spelling words, Appendix 1) ---------------- */
const WORDS_Y2 = ["because","everybody","beautiful","different","climb","children","behind","pretty",
  "hour","improve","clothes","busy","people","water","again","money","christmas","parents","floor",
  "door","poor","mind","kind","wild","most","cold","gold","hold","told","great","break","steak",
  "class","grass","plant","path","bath","sure","sugar","could","would","should","whole","many","every"];

const WORDS_Y34 = ["accident","accidentally","actual","actually","address","answer","appear","arrive",
  "believe","bicycle","breath","breathe","build","business","calendar","caught","centre","century",
  "certain","circle","complete","consider","continue","decide","describe","different","difficult",
  "disappear","early","earth","eight","eighth","enough","exercise","experience","experiment","extreme",
  "famous","favourite","february","forward","forwards","fruit","grammar","group","guard","guide","heard",
  "heart","height","history","imagine","increase","important","interest","island","knowledge","learn",
  "length","library","material","medicine","mention","minute","natural","naughty","notice","occasion",
  "occasionally","often","opposite","ordinary","particular","peculiar","perhaps","popular","position",
  "possess","possession","possible","potatoes","pressure","probably","promise","purpose","quarter",
  "question","recent","regular","reign","remember","sentence","separate","special","straight","strange",
  "strength","suppose","surprise","therefore","though","although","thought","through","various","weight",
  "woman","women"];

const WORDS_Y56 = ["accommodate","accompany","according","achieve","aggressive","amateur","ancient",
  "apparent","appreciate","attached","available","average","awkward","bargain","bruise","category",
  "cemetery","committee","communicate","community","competition","conscience","conscious","controversy",
  "convenience","correspond","criticise","curiosity","definite","desperate","determined","develop",
  "dictionary","disastrous","embarrass","environment","equip","equipped","equipment","especially",
  "exaggerate","excellent","existence","explanation","familiar","foreign","forty","frequently",
  "government","guarantee","harass","hindrance","identity","immediate","immediately","individual",
  "interfere","interrupt","language","leisure","lightning","marvellous","mischievous","muscle","necessary",
  "neighbour","nuisance","occupy","occur","opportunity","parliament","persuade","physical","prejudice",
  "privilege","profession","programme","pronunciation","queue","recognise","recommend","relevant",
  "restaurant","rhyme","rhythm","sacrifice","secretary","shoulder","signature","sincere","sincerely",
  "soldier","stomach","sufficient","suggest","symbol","system","temperature","thorough","twelfth",
  "variety","vegetable","vehicle","yacht"];

const YEAR_CONFIG = {
  2:{ label:"Year 2", words:WORDS_Y2, blanks:(w)=> 1 },
  3:{ label:"Year 3", words:WORDS_Y34, blanks:(w)=> w.length>=9 ? 2 : 1 },
  4:{ label:"Year 4", words:WORDS_Y34, blanks:(w)=> w.length>=10 ? 3 : (w.length<=5 ? 1 : 2) },
  5:{ label:"Year 5", words:WORDS_Y56, blanks:(w)=> w.length>=10 ? 3 : (w.length<=6 ? 1 : 2) },
  6:{ label:"Year 6", words:WORDS_Y56, blanks:(w)=> w.length>=9 ? 3 : (w.length<=5 ? 1 : 2) },
};

const TEST_SECONDS_PER_Q = 25;
const QUESTIONS_PER_TEST = 20;
const LB_KEY = "wordWizardsLeaderboard";
const STATS_KEY = "wordWizardsStats";
const PROGRESS_KEY = "wordWizardsProgress";
const MUTE_KEY = "wordWizardsMuted";

/* ---------------- State ---------------- */
let state = {};

/* localStorage.setItem/removeItem can throw (quota exceeded, storage disabled
   by browser settings, some private-browsing modes) — wrap so a save failure
   degrades gracefully instead of crashing the app mid-quiz. */
function safeSetItem(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ return false; }
}
function safeRemoveItem(key){
  try{ localStorage.removeItem(key); return true; }
  catch(e){ return false; }
}

function applyTheme(subject){
  document.body.classList.remove('theme-spelling','theme-times','theme-punctuation');
  if(subject) document.body.classList.add('theme-'+subject);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---- Spaced-repetition stats: keyed by subject+level, then by word/fact (stored in this browser) ---- */
function loadAllStats(){
  try{ return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch(e){ return {}; }
}
function loadLevelStats(levelKey){
  return loadAllStats()[levelKey] || {};
}
function saveStat(levelKey, factKey, isCorrect){
  const all = loadAllStats();
  if(!all[levelKey]) all[levelKey] = {};
  if(!all[levelKey][factKey]) all[levelKey][factKey] = { correct:0, wrong:0 };
  if(isCorrect) all[levelKey][factKey].correct += 1;
  else all[levelKey][factKey].wrong += 1;
  safeSetItem(STATS_KEY, JSON.stringify(all));
}

/* ---- Per-student progress: streaks, badges, history (stored in this browser, keyed by name) ---- */
/* Uses local calendar date (not toISOString, which is UTC) so streaks and
   history dates match the student's actual day, not UTC's. */
function formatLocalDate(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}
function todayStr(){
  return formatLocalDate(new Date());
}
function loadAllProgress(){
  try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveAllProgress(all){
  safeSetItem(PROGRESS_KEY, JSON.stringify(all));
}
function blankProgress(){
  return { totalCorrect:0, totalAnswered:0, streak:{ count:0, lastDate:null }, badges:[], history:[] };
}
/* Student names are typed freely and used as object keys below. A name like
   "__proto__" would otherwise resolve through the prototype chain instead of
   being a normal missing key — guard against that and the other dangerous keys. */
function safeKey(name){
  const s = String(name);
  return (s==='__proto__' || s==='constructor' || s==='prototype') ? ('_'+s) : s;
}
function getStudentProgress(name){
  const all = loadAllProgress();
  return (Object.prototype.hasOwnProperty.call(all, safeKey(name)) && all[safeKey(name)]) || blankProgress();
}
function updateStreak(progress){
  const today = todayStr();
  if(progress.streak.lastDate === today) return; // already counted today
  const yesterday = formatLocalDate(new Date(Date.now() - 86400000));
  progress.streak.count = (progress.streak.lastDate === yesterday) ? progress.streak.count + 1 : 1;
  progress.streak.lastDate = today;
}

const BADGES = [
  { id:'first_quiz',    icon:'🌟', name:'First Steps',      desc:'Complete your first quiz',        check:p=> p.history.length>=1 },
  { id:'perfect_score', icon:'💯', name:'Perfect Score',     desc:'Get 100% on a quiz',               check:p=> p.history.some(h=>h.score===h.total) },
  { id:'streak_3',      icon:'🔥', name:'3-Day Streak',      desc:'Practise 3 days in a row',         check:p=> p.streak.count>=3 },
  { id:'streak_7',      icon:'🔥', name:'Week Warrior',      desc:'Practise 7 days in a row',         check:p=> p.streak.count>=7 },
  { id:'correct_50',    icon:'🎯', name:'Sharp Shooter',     desc:'Answer 50 questions correctly',    check:p=> p.totalCorrect>=50 },
  { id:'correct_100',   icon:'🏅', name:'Century Club',      desc:'Answer 100 questions correctly',   check:p=> p.totalCorrect>=100 },
  { id:'both_subjects', icon:'🌈', name:'All-Rounder',       desc:'Try two different subjects', check:p=> new Set(p.history.map(h=>h.subject)).size>=2 },
  { id:'quiz_10',       icon:'📚', name:'Dedicated Learner', desc:'Complete 10 quizzes',              check:p=> p.history.length>=10 },
];

/* Records the just-finished quiz against the student's progress, updates their
   streak, and returns any badges newly earned this time (for a results-screen callout). */
function recordProgress(){
  if(!state.name) return [];
  const key = safeKey(state.name);
  const all = loadAllProgress();
  const p = (Object.prototype.hasOwnProperty.call(all, key) && all[key]) || blankProgress();
  p.totalCorrect += state.score;
  p.totalAnswered += state.questions.length;
  updateStreak(p);
  p.history.push({ date: todayStr(), subject: state.subject, levelLabel: state.levelLabel, score: state.score, total: state.questions.length });
  if(p.history.length > 100) p.history = p.history.slice(-100);
  const newlyEarned = [];
  BADGES.forEach(b=>{
    if(!p.badges.includes(b.id) && b.check(p)){
      p.badges.push(b.id);
      newlyEarned.push(b);
    }
  });
  all[key] = p;
  saveAllProgress(all);
  return newlyEarned;
}

/* ---- Sound effects (synthesised, no audio files needed) ---- */
let audioCtx = null;
function playTone(freq, duration, delay){
  if(state.muted) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t0 = audioCtx.currentTime + (delay||0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.16, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0+duration+0.05);
  } catch(e){ /* audio unavailable (e.g. autoplay restrictions) — fail silently */ }
}
function playCorrectSound(){
  playTone(523.25, 0.12, 0);   // C5
  playTone(783.99, 0.18, 0.1); // G5
}
function playWrongSound(){
  playTone(196, 0.25, 0); // low, gentle — not harsh
}
function loadMuted(){
  try{ return localStorage.getItem(MUTE_KEY) === 'true'; }
  catch(e){ return false; }
}
function toggleMuted(){
  state.muted = !state.muted;
  safeSetItem(MUTE_KEY, String(state.muted));
}

/* Weighted sample without replacement (Efraimidis-Spirakis): words/facts missed before
   are more likely to be picked; ones answered correctly several times in a row
   show up less often. */
function weightedSample(items, weights, n){
  const keyed = items.map((it,i)=> ({ it, key: Math.pow(Math.random(), 1/Math.max(weights[i], 0.05)) }));
  keyed.sort((a,b)=> b.key - a.key);
  return keyed.slice(0, Math.min(n, keyed.length)).map(k=>k.it);
}

/* Like weightedSample, but if the pool is smaller than n, fills the remainder
   with weighted picks WITH replacement so a test always has n questions. */
function weightedFill(items, weights, n){
  const first = weightedSample(items, weights, n);
  if(first.length >= n || items.length===0) return first;
  const totalWeight = weights.reduce((a,b)=>a+b, 0);
  const filler = [];
  for(let i=0; i<n-first.length; i++){
    let r = Math.random() * totalWeight;
    let picked = items[items.length-1];
    for(let j=0;j<items.length;j++){
      r -= weights[j];
      if(r<=0){ picked = items[j]; break; }
    }
    filler.push(picked);
  }
  return shuffle([...first, ...filler]);
}

/* ---- Spelling questions ---- */
function makeQuestion(word, cfg){
  const blankCount = Math.min(cfg.blanks(word), word.length-1);
  const positions = shuffle([...Array(word.length).keys()].slice(1)).slice(0, blankCount).sort((a,b)=>a-b);
  return { word, positions };
}

function buildSpellingQuestions(year){
  const cfg = YEAR_CONFIG[year];
  const stats = loadLevelStats(`spelling-${year}`);
  const weights = cfg.words.map(w=>{
    const s = stats[w] || { correct:0, wrong:0 };
    if(s.correct>=3 && s.wrong===0) return 0.4;
    return 1 + s.wrong*2;
  });
  const pool = weightedFill(cfg.words, weights, QUESTIONS_PER_TEST);
  return pool.map(w=>makeQuestion(w, cfg));
}

/* ---- Number facts questions (+ - × ÷) ---- */

/* Year group difficulty: how big the "partner" number can be, and how often the
   blank appears in the answer spot vs. as a missing operand (a trickier "find the
   missing number" style question). Younger years always get the classic
   "a op b = ?" layout; older years mix in "a op ? = c" and "? op b = c". */
const NF_YEAR_CONFIG = {
  R:{ label:'Reception', multiplierMax:5,  blankWeights:{ result:1,    left:0,     right:0 } },
  1:{ label:'Year 1',    multiplierMax:10, blankWeights:{ result:1,    left:0,     right:0 } },
  2:{ label:'Year 2',    multiplierMax:12, blankWeights:{ result:0.7,  left:0.15,  right:0.15 } },
  3:{ label:'Year 3',    multiplierMax:12, blankWeights:{ result:0.5,  left:0.25,  right:0.25 } },
  4:{ label:'Year 4',    multiplierMax:12, blankWeights:{ result:0.4,  left:0.3,   right:0.3 } },
  5:{ label:'Year 5',    multiplierMax:12, blankWeights:{ result:0.35, left:0.325, right:0.325 } },
  6:{ label:'Year 6',    multiplierMax:12, blankWeights:{ result:0.3,  left:0.35,  right:0.35 } },
};
function currentNfYearConfig(){
  return NF_YEAR_CONFIG[state.nfYear] || NF_YEAR_CONFIG['4'];
}

const OP_CODE = { '×':'x', '÷':'d', '+':'a', '-':'s' };
function factKeyFor(table, multiplier, op){
  return `${table}_${multiplier}_${OP_CODE[op]}`;
}

/* Which slot(s) can safely be blanked without the question becoming ambiguous
   (e.g. "0 × ? = 0" or "0 ÷ ? = 0" have infinitely many correct answers). */
function validBlankSlots(op, left, right, result){
  const slots = ['left','right','result'];
  if(op==='×') return slots.filter(s => !(s==='left' && right===0) && !(s==='right' && left===0));
  if(op==='÷') return slots.filter(s => !(s==='right' && result===0));
  return slots; // + and - are always unambiguous in any slot
}

function pickBlankSlot(op, left, right, result){
  const valid = validBlankSlots(op, left, right, result);
  const weights = currentNfYearConfig().blankWeights;
  const w = valid.map(s => weights[s]);
  const total = w.reduce((a,b)=>a+b, 0);
  if(total<=0) return valid[0] || 'result';
  let r = Math.random() * total;
  for(let i=0;i<valid.length;i++){
    r -= w[i];
    if(r<=0) return valid[i];
  }
  return valid[valid.length-1];
}

function makeTimesQuestion(f){
  let left,right,result;
  if(f.op==='×'){ left=f.table; right=f.multiplier; result=left*right; }
  else if(f.op==='÷'){ left=f.table*f.multiplier; right=f.table; result=f.multiplier; }
  else if(f.op==='+'){ left=f.table; right=f.multiplier; result=left+right; }
  else { left=f.table+f.multiplier; right=f.table; result=f.multiplier; } // subtraction: (table+multiplier) - table = multiplier

  const blank = pickBlankSlot(f.op, left, right, result);
  const answer = blank==='left' ? left : blank==='right' ? right : result;

  return { table:f.table, multiplier:f.multiplier, op:f.op, left, right, result, blank, answer, factKey: factKeyFor(f.table, f.multiplier, f.op) };
}

const OPS_FOR = { mult:['×'], div:['÷'], add:['+'], sub:['-'], mixed:['×','÷','+','-'] };

function buildTimesQuestions(table, operation){
  const levelKey = `times-${state.nfYear}-${table}-${operation}`;
  const stats = loadLevelStats(levelKey);
  const tables = table==='mixed' ? [...Array(13).keys()] : [table];
  const ops = OPS_FOR[operation];
  const multiplierMax = currentNfYearConfig().multiplierMax;
  let facts = [];
  for(const t of tables){
    for(let m=0; m<=multiplierMax; m++){
      for(const op of ops){
        if(op==='÷' && t===0) continue; // division by zero is invalid
        facts.push({ table:t, multiplier:m, op });
      }
    }
  }
  if(facts.length===0){
    // Only reachable if table is 0 and operation is division-only; 0 has no valid division facts.
    for(let m=0; m<=multiplierMax; m++) facts.push({ table:0, multiplier:m, op:'×' });
  }
  const weights = facts.map(f=>{
    const key = factKeyFor(f.table, f.multiplier, f.op);
    const s = stats[key] || { correct:0, wrong:0 };
    if(s.correct>=3 && s.wrong===0) return 0.4;
    return 1 + s.wrong*2;
  });
  const chosen = weightedFill(facts, weights, QUESTIONS_PER_TEST);
  return chosen.map(makeTimesQuestion);
}

function buildPunctQuestions(year, type){
  const levelKey = `punct-${year}-${type}`;
  const stats = loadLevelStats(levelKey);
  let pool = [];
  if(type==='punct' || type==='mixed'){
    pool = pool.concat(PUNCT_BANK[year].map(item=> ({
      kind:'punct', before:item.before, after:item.after, answer:item.answer, choices:item.choices,
      factKey: `p_${item.before}${item.answer}${item.after}`
    })));
  }
  if(type==='capital' || type==='mixed'){
    pool = pool.concat(CAPITAL_BANK[year].map(item=> ({
      kind:'capital', words:item.words, capIndex:item.capIndex,
      factKey: `c_${item.words.join(' ')}`
    })));
  }
  const weights = pool.map(item=>{
    const s = stats[item.factKey] || { correct:0, wrong:0 };
    if(s.correct>=3 && s.wrong===0) return 0.4;
    return 1 + s.wrong*2;
  });
  const chosen = weightedFill(pool, weights, QUESTIONS_PER_TEST);
  return chosen.map(item=> item.kind==='punct' ? { ...item, choices: shuffle(item.choices) } : item);
}

function buildQuestions(){
  if(state.subject==='times') return buildTimesQuestions(state.table, state.operation);
  if(state.subject==='punctuation') return buildPunctQuestions(state.punctYear, state.punctType);
  return buildSpellingQuestions(state.year);
}

const OP_LABEL = { mult:'✖️ Multiply', div:'➗ Divide', add:'➕ Add', sub:'➖ Subtract', mixed:'🔀 Mixed' };
const SUBJECT_ICON = { times:'🔢', punctuation:'✍️', spelling:'📖' };

function computeLevel(){
  if(state.subject==='times'){
    const yearLabel = currentNfYearConfig().label;
    const tableLabel = state.table==='mixed' ? 'Mixed 0-12' : `${state.table}s`;
    state.levelKey = `times-${state.nfYear}-${state.table}-${state.operation}`;
    state.levelLabel = `${yearLabel} · ${tableLabel} · ${OP_LABEL[state.operation]}`;
  } else if(state.subject==='punctuation'){
    const yearLabel = PUNCT_YEAR_LABELS[state.punctYear];
    state.levelKey = `punct-${state.punctYear}-${state.punctType}`;
    state.levelLabel = `${yearLabel} · ${PUNCT_TYPE_LABEL[state.punctType]}`;
  } else {
    state.levelKey = `spelling-${state.year}`;
    state.levelLabel = YEAR_CONFIG[state.year].label;
  }
}

/* ---- Speak the word / equation aloud ---- */
let cachedVoice = null;
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = ()=>{ cachedVoice = null; };
}
function pickVoice(){
  if(cachedVoice) return cachedVoice;
  const voices = speechSynthesis.getVoices();
  cachedVoice = voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang && v.lang.startsWith('en')) || voices[0] || null;
  return cachedVoice;
}
function speakWord(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.85;
  const voice = pickVoice();
  if(voice) utter.voice = voice;
  speechSynthesis.speak(utter);
}
const OP_SPOKEN = { '×':'times', '÷':'divided by', '+':'plus', '-':'minus' };
function speakCurrentQuestion(q){
  if(state.subject==='times'){
    const opWord = OP_SPOKEN[q.op];
    let phrase;
    if(q.blank==='result') phrase = `${q.left} ${opWord} ${q.right}`;
    else if(q.blank==='left') phrase = `what number ${opWord} ${q.right} equals ${q.result}`;
    else phrase = `${q.left} ${opWord} what number equals ${q.result}`;
    speakWord(phrase);
  } else if(state.subject==='punctuation'){
    speakWord(q.kind==='punct' ? `${q.before} ${q.after}`.trim() : q.words.join(' '));
  } else {
    speakWord(q.word);
  }
}

/* ---- Setup wizard: one simple choice per screen, easy for young children ---- */
function getSetupSteps(){
  if(state.subject==='times') return ['name','year','operation','numbers','mode'];
  if(state.subject==='punctuation') return ['name','year','ptype','mode'];
  return ['name','year','mode'];
}

function renderSetup(){
  applyTheme(state.subject);
  state.setupStep = 0;
  renderSetupStep();
}

/* Used when returning from Results ("Change Level / Mode") — same student,
   so we skip straight past the name step. */
function continueSetup(){
  applyTheme(state.subject);
  state.setupStep = 1;
  renderSetupStep();
}

function goToNextStep(){
  state.setupStep += 1;
  renderSetupStep();
}

function goToPrevStep(){
  if(state.setupStep <= 0){
    renderHome();
  } else {
    state.setupStep -= 1;
    renderSetupStep();
  }
}

function renderSetupStep(){
  const step = getSetupSteps()[state.setupStep];
  if(step==='name') renderNameStep();
  else if(step==='year') renderYearStep();
  else if(step==='operation') renderOperationStep();
  else if(step==='numbers') renderNumbersStep();
  else if(step==='ptype') renderPunctTypeStep();
  else if(step==='mode') renderModeStep();
}

function startQuiz(){
  clearTimeout(state.advanceTimeout);
  computeLevel();
  state.questions = buildQuestions();
  state.index = 0;
  state.score = 0;
  state.wrongWords = [];
  state.timerInterval = null;
  renderQuestion();
}

function startReview(){
  clearTimeout(state.advanceTimeout);
  if(state.subject==='times'){
    const seen = new Set();
    const items = [];
    state.wrongWords.forEach(it=>{
      const k = `${it.table}_${it.multiplier}_${it.op}`;
      if(!seen.has(k)){ seen.add(k); items.push(it); }
    });
    state.questions = items.map(it=> makeTimesQuestion({ table:it.table, multiplier:it.multiplier, op:it.op }));
  } else if(state.subject==='punctuation'){
    const seen = new Set();
    state.questions = state.wrongWords.filter(q=>{
      if(seen.has(q.factKey)) return false;
      seen.add(q.factKey);
      return true;
    });
  } else {
    const words = [...new Set(state.wrongWords)];
    state.questions = words.map(w=> makeQuestion(w, YEAR_CONFIG[state.year]));
  }
  state.index = 0;
  state.score = 0;
  state.wrongWords = [];
  state.mode = 'review';
  state.timerInterval = null;
  renderQuestion();
}

function exitQuiz(){
  clearInterval(state.timerInterval);
  const label = state.mode==='test' ? 'this test' : state.mode==='review' ? 'this review' : 'this practice session';
  if(confirm(`End ${label} and go back to the main menu? Your progress won't be saved.`)){
    clearTimeout(state.advanceTimeout);
    renderHome();
  } else if(state.mode==='test'){
    resumeTimer();
  }
}

function renderQuestion(){
  applyTheme(state.subject);
  clearInterval(state.timerInterval);
  const app = document.getElementById('app');
  const q = state.questions[state.index];
  const total = state.questions.length;

  const modeLabel = state.mode==='test' ? 'Test' : state.mode==='review' ? 'Review' : 'Practice';
  app.innerHTML = `
    <div class="screen">
    <div class="quiz-header">
      <button class="exit-btn" id="exitBtn">✕ Exit</button>
      <div class="level-pill">${state.levelLabel} &middot; ${modeLabel}</div>
      <div class="score-pill">⭐ ${state.score}</div>
    </div>
    <div class="progress-row">
      <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${(state.index/total)*100}%"></div></div>
      <span class="progress-count">${state.index+1}/${total}</span>
    </div>
    ${state.mode==='test' ? `<div class="timer-bar-outer"><div class="timer-bar-inner" id="timerBar" style="width:100%"></div></div>` : ''}

    <button class="speak-btn" id="speakBtn" type="button">🔊 ${state.subject==='times' ? 'Hear it' : state.subject==='punctuation' ? 'Hear the sentence' : 'Hear the word'}</button>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback"></div>

    <div class="quiz-buttons">
      <button class="big-btn" id="checkBtn">Check ✅</button>
    </div>
    </div>
  `;

  document.getElementById('exitBtn').addEventListener('click', exitQuiz);
  document.getElementById('speakBtn').addEventListener('click', ()=> speakCurrentQuestion(q));
  speakCurrentQuestion(q);

  state.selectedChoiceIdx = null;
  if(state.subject==='times'){
    wireTimesInputs(renderTimesAnswerArea(q));
  } else if(state.subject==='punctuation'){
    wireChoiceInputs(q.kind==='punct' ? renderPunctAnswerArea(q) : renderCapitalAnswerArea(q));
  } else {
    wireSpellingInputs(renderSpellingAnswerArea(q));
  }

  document.getElementById('checkBtn').addEventListener('click', ()=> submitAnswer());

  if(state.mode==='test'){
    state.secondsLeft = TEST_SECONDS_PER_Q;
    startTimer();
  }

  state.answered = false;
}

function renderSpellingAnswerArea(q){
  const area = document.getElementById('answerArea');
  area.innerHTML = `<div class="word-box" id="wordBox"></div>`;
  const wordBox = document.getElementById('wordBox');
  q.word.split('').forEach((letter, idx)=>{
    if(q.positions.includes(idx)){
      const div = document.createElement('div');
      div.className = 'blank-tile';
      div.innerHTML = `<input type="text" maxlength="1" data-idx="${idx}" autocomplete="off">`;
      wordBox.appendChild(div);
    } else {
      const div = document.createElement('div');
      div.className = 'letter-tile';
      div.textContent = letter;
      wordBox.appendChild(div);
    }
  });
  return [...wordBox.querySelectorAll('input')];
}

function wireSpellingInputs(inputs){
  inputs.forEach((inp, i)=>{
    inp.addEventListener('input', ()=>{
      inp.value = inp.value.replace(/[^a-zA-Z]/g,'').slice(0,1);
      if(inp.value && i < inputs.length-1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', (e)=>{
      if(e.key==='Backspace' && !inp.value && i>0) inputs[i-1].focus();
      if(e.key==='Enter') submitAnswer();
    });
  });
  if(inputs[0]) inputs[0].focus();
}

function renderTimesAnswerArea(q){
  const area = document.getElementById('answerArea');
  const slotHtml = (name, value) => q.blank===name
    ? `<input type="text" inputmode="numeric" class="answer-input" id="answerInput" maxlength="3" autocomplete="off">`
    : `<span>${value}</span>`;
  area.innerHTML = `
    <div class="equation-box">
      ${slotHtml('left', q.left)}<span>${q.op}</span>${slotHtml('right', q.right)}<span>=</span>${slotHtml('result', q.result)}
    </div>
  `;
  return [document.getElementById('answerInput')];
}

function wireTimesInputs(inputs){
  const inp = inputs[0];
  inp.addEventListener('input', ()=>{
    inp.value = inp.value.replace(/[^0-9]/g,'').slice(0,3);
  });
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Enter') submitAnswer();
  });
  inp.focus();
}

/* Punctuation and capital-letter questions are both "tap the correct choice"
   — a sentence with a gap plus a few punctuation-mark buttons, or the sentence
   itself shown as tappable word chips. Tapping selects (matching the
   year/table/op button pattern elsewhere); Check still confirms the answer. */
function renderPunctAnswerArea(q){
  const area = document.getElementById('answerArea');
  area.innerHTML = `
    <div class="sentence-box">${escapeHtml(q.before)}<span class="sentence-blank">&nbsp;</span>${escapeHtml(q.after)}</div>
    <div class="choice-row" id="choiceRow">
      ${q.choices.map((c,i)=>`<button type="button" class="choice-btn" data-idx="${i}">${escapeHtml(c)}</button>`).join('')}
    </div>
  `;
  return [...document.querySelectorAll('#choiceRow .choice-btn')];
}

function renderCapitalAnswerArea(q){
  const area = document.getElementById('answerArea');
  area.innerHTML = `
    <div class="sentence-box" style="font-size:1.1em;">Tap the word that needs a capital letter</div>
    <div class="choice-row" id="choiceRow">
      ${q.words.map((w,i)=>`<button type="button" class="choice-btn word-chip" data-idx="${i}">${escapeHtml(i===q.capIndex ? w.toLowerCase() : w)}</button>`).join('')}
    </div>
  `;
  return [...document.querySelectorAll('#choiceRow .choice-btn')];
}

function wireChoiceInputs(buttons){
  buttons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      buttons.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      state.selectedChoiceIdx = parseInt(btn.dataset.idx,10);
    });
  });
}

/* Counts down from the real wall-clock end time rather than decrementing a
   counter once per tick — a setInterval tick can be delayed or throttled
   (e.g. a backgrounded browser tab), and re-deriving from Date.now() each
   tick means the countdown is always accurate to actual elapsed time. */
function startTimer(){
  const bar = document.getElementById('timerBar');
  if(!bar) return;
  state.timerEndAt = Date.now() + state.secondsLeft*1000;
  clearInterval(state.timerInterval);
  const tick = ()=>{
    const remainingMs = state.timerEndAt - Date.now();
    state.secondsLeft = Math.max(0, Math.ceil(remainingMs/1000));
    bar.style.width = Math.max(0,(state.secondsLeft/TEST_SECONDS_PER_Q)*100) + '%';
    if(remainingMs<=0){
      clearInterval(state.timerInterval);
      submitAnswer(true);
    }
  };
  tick();
  state.timerInterval = setInterval(tick, 1000);
}

function resumeTimer(){
  if(!state.answered) startTimer();
}

function submitAnswer(timedOut){
  if(state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = state.questions[state.index];
  let correct;
  let factKey;

  if(state.subject==='times'){
    const inp = document.getElementById('answerInput');
    const val = parseInt((inp.value||'').trim(), 10);
    correct = !timedOut && val === q.answer;
    inp.disabled = true;
    inp.style.background = correct ? '#eafcf1' : '#ffeef0';
    inp.style.borderColor = correct ? 'var(--success)' : 'var(--danger)';
    inp.classList.add(correct ? 'tile-correct' : 'tile-wrong');
    if(!correct) inp.value = q.answer;
    factKey = q.factKey;
  } else if(state.subject==='punctuation'){
    const buttons = [...document.querySelectorAll('#choiceRow .choice-btn')];
    const selectedIdx = state.selectedChoiceIdx;
    const correctIdx = q.kind==='punct' ? q.choices.indexOf(q.answer) : q.capIndex;
    correct = !timedOut && selectedIdx === correctIdx;
    buttons.forEach((btn,i)=>{
      btn.disabled = true;
      if(i===correctIdx) btn.classList.add('choice-correct');
      else if(i===selectedIdx) btn.classList.add('choice-wrong');
    });
    factKey = q.factKey;
  } else {
    const inputs = [...document.querySelectorAll('#wordBox input')];
    correct = !timedOut;
    inputs.forEach(inp=>{
      const idx = parseInt(inp.dataset.idx,10);
      const val = (inp.value||'').toLowerCase();
      const isRight = val === q.word[idx];
      if(!isRight) correct = false;
      inp.disabled = true;
      inp.style.background = isRight ? '#eafcf1' : '#ffeef0';
      inp.style.borderColor = isRight ? 'var(--success)' : 'var(--danger)';
      inp.classList.add(isRight ? 'tile-correct' : 'tile-wrong');
      if(!isRight) inp.value = q.word[idx];
    });
    factKey = q.word;
  }

  saveStat(state.levelKey, factKey, correct);
  if(!correct){
    if(state.subject==='times') state.wrongWords.push({ table:q.table, multiplier:q.multiplier, op:q.op });
    else if(state.subject==='punctuation') state.wrongWords.push(q);
    else state.wrongWords.push(q.word);
  }

  document.getElementById('checkBtn').classList.add('hidden');
  const fb = document.getElementById('feedback');
  if(correct){
    state.score += 1;
    fb.textContent = "Correct! 🎉";
    fb.className = "feedback correct";
    playCorrectSound();
  } else {
    playWrongSound();
    let correctText;
    if(state.subject==='times') correctText = `${q.left} ${q.op} ${q.right} = ${q.result}`;
    else if(state.subject==='punctuation'){
      correctText = q.kind==='punct'
        ? `"${q.before}${q.answer}${q.after}"`
        : `"${q.words.join(' ')}"`;
    }
    else correctText = `"${q.word}"`;
    fb.textContent = timedOut ? `Time's up! It was ${correctText}` : `Not quite — it was ${correctText}`;
    fb.className = "feedback wrong";
  }

  state.advanceTimeout = setTimeout(()=>{
    state.advanceTimeout = null;
    state.index += 1;
    if(state.index >= state.questions.length){
      finishQuiz();
    } else {
      renderQuestion();
    }
  }, 2200);
}

function finishQuiz(){
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);

  if(state.mode==='review'){
    renderReviewComplete(total);
    return;
  }

  let grade, emoji, tier;
  if(pct===100){ grade="Platinum Wizard"; emoji="🏆"; tier="platinum"; }
  else if(pct>=80){ grade="Gold Wizard"; emoji="🥇"; tier="gold"; }
  else if(pct>=60){ grade="Silver Wizard"; emoji="🥈"; tier="silver"; }
  else if(pct>=40){ grade="Bronze Wizard"; emoji="🥉"; tier="bronze"; }
  else { grade="Keep Practicing"; emoji="📚"; tier="practice"; }

  if(state.mode==='test'){
    saveToLeaderboard({ name: state.name, subject: state.subject, levelKey: state.levelKey, levelLabel: state.levelLabel, score: state.score, total });
  }

  const newBadges = recordProgress();
  const streak = getStudentProgress(state.name).streak.count;

  state.lastResults = { pct, grade, emoji, tier, total, mode: state.mode, score: state.score, streak, newBadges };
  renderResults(pct, grade, emoji, tier, total, state.score, streak, newBadges);
}

function renderResults(pct, grade, emoji, tier, total, score, streak, newBadges){
  applyTheme(state.subject);
  const app = document.getElementById('app');
  const wrongCount = (state.wrongWords || []).length;
  const itemWord = state.subject==='times' ? 'Fact' : state.subject==='punctuation' ? 'Sentence' : 'Word';
  const badgeCallout = (newBadges && newBadges.length>0) ? `
    <div class="new-badge-banner">
      ${newBadges.map(b=>`<div>${b.icon} <strong>New badge:</strong> ${escapeHtml(b.name)}</div>`).join('')}
    </div>` : '';
  const streakBanner = (streak && streak>=2) ? `<div class="streak-banner">🔥 ${streak}-day streak — keep it up!</div>` : '';
  app.innerHTML = `
    <div class="screen">
    <h1>Results</h1>
    <div class="medal medal-${tier}">${emoji}</div>
    <div class="score-big">${score} / ${total}</div>
    <div class="badge">${grade} &middot; ${pct}%</div>
    ${streakBanner}
    ${badgeCallout}
    <div id="confettiHost" style="position:relative;height:0;"></div>

    ${wrongCount>0 ? `<button class="big-btn btn-warning" id="reviewBtn">📝 Review ${wrongCount} Tricky ${itemWord}${wrongCount===1?'':'s'}</button>` : ''}
    <button class="big-btn btn-success" id="againBtn">Play Again (${state.levelLabel}) 🔁</button>
    <button class="big-btn btn-info" id="changeBtn">Change Level / Mode 🔀</button>
    <button class="link-btn" id="progressBtn2">📈 My Progress</button>
    ${state.mode==='test' ? `<button class="link-btn" id="lbBtn2">View Leaderboard 🏅</button>` : ''}
    </div>
  `;

  if(pct>=80) launchConfetti();

  const reviewBtn = document.getElementById('reviewBtn');
  if(reviewBtn) reviewBtn.addEventListener('click', startReview);
  document.getElementById('againBtn').addEventListener('click', startQuiz);
  document.getElementById('changeBtn').addEventListener('click', continueSetup);
  document.getElementById('progressBtn2').addEventListener('click', ()=> renderMyProgress(state.name));
  const lbBtn2 = document.getElementById('lbBtn2');
  if(lbBtn2) lbBtn2.addEventListener('click', ()=> renderLeaderboard(state.levelKey));
}

function renderReviewComplete(total){
  applyTheme(state.subject);
  const app = document.getElementById('app');
  const itemWord = state.subject==='times' ? 'fact' : state.subject==='punctuation' ? 'sentence' : 'word';
  app.innerHTML = `
    <div class="screen">
    <h1>💪 Review Complete!</h1>
    <div class="score-big">${state.score} / ${total}</div>
    <div class="subtitle">You practiced ${total} tricky ${itemWord}${total===1?'':'s'}.</div>

    <button class="big-btn" id="backResultsBtn">Back to Results</button>
    <button class="big-btn btn-info" id="homeBtn2">Home 🏠</button>
    </div>
  `;

  document.getElementById('backResultsBtn').addEventListener('click', ()=>{
    const r = state.lastResults;
    state.mode = r.mode;
    renderResults(r.pct, r.grade, r.emoji, r.tier, r.total, r.score, r.streak, r.newBadges);
  });
  document.getElementById('homeBtn2').addEventListener('click', renderHome);
}

function launchConfetti(){
  const host = document.getElementById('app');
  const colors = ['#7c3aed','#f59e0b','#ec4899','#22c55e','#3b82f6'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + '%';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (2+Math.random()*1.5) + 's';
    c.style.animationDelay = (Math.random()*0.5) + 's';
    host.appendChild(c);
    setTimeout(()=>c.remove(), 4000);
  }
}

}

  `;
  document.getElementById('backBtn').addEventListener('click', renderHome);
  document.getElementById('clearBtn').addEventListener('click', ()=>{
    if(confirm('Clear all leaderboard scores? This cannot be undone.')){
      safeRemoveItem(LB_KEY);
      renderLeaderboard(filterLevelKey);
    }
  });
  document.getElementById('clearStatsBtn').addEventListener('click', ()=>{
    if(confirm('Reset which words/facts students have found tricky? This forgets all past mistakes.')){
      safeRemoveItem(STATS_KEY);
    }
  });
  const printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.addEventListener('click', ()=> window.print());
  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.addEventListener('click', ()=> exportLeaderboardCSV(lb));
}

function exportLeaderboardCSV(lb){
  const header = 'Name,Subject,Level,Score,Total,Date';
  const escapeCsv = v => `"${String(v).replace(/"/g,'""')}"`;
  const rows = lb.map(r=> [r.name, r.subject, r.levelLabel, r.score, r.total, r.date].map(escapeCsv).join(','));
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `leaderboard-${todayStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------------- Class Insights (for teachers): trickiest words/facts across all students ---------------- */
function describeFact(levelKey, factKey){
  if(levelKey.startsWith('spelling-')) return { text: factKey, subject:'spelling' };
  if(levelKey.startsWith('punct-')) return { text: factKey.slice(2), subject:'punctuation' };
  const parts = factKey.split('_');
  const table = parseInt(parts[0],10);
  const multiplier = parseInt(parts[1],10);
  const opMap = { x:'×', d:'÷', a:'+', s:'-' };
  const q = makeTimesQuestion({ table, multiplier, op: opMap[parts[2]] });
  return { text: `${q.left} ${q.op} ${q.right} = ${q.result}`, subject:'times' };
}

function renderClassInsights(){
  applyTheme(null);
  const app = document.getElementById('app');
  const all = loadAllStats();
  const merge = {};
  Object.keys(all).forEach(levelKey=>{
    Object.keys(all[levelKey]).forEach(factKey=>{
      const s = all[levelKey][factKey];
      if(s.wrong<=0) return;
      const info = describeFact(levelKey, factKey);
      const key = info.subject+'|'+info.text;
      if(!merge[key]) merge[key] = { text: info.text, subject: info.subject, wrong:0, correct:0 };
      merge[key].wrong += s.wrong;
      merge[key].correct += s.correct;
    });
  });
  const rows = Object.values(merge).sort((a,b)=> b.wrong-a.wrong);
  const spellingRows = rows.filter(r=>r.subject==='spelling').slice(0,8);
  const timesRows = rows.filter(r=>r.subject==='times').slice(0,8);
  const punctRows = rows.filter(r=>r.subject==='punctuation').slice(0,8);

  const listHtml = list => list.length>0 ? list.map(r=>`
    <div class="insight-row">
      <span>${escapeHtml(r.text)}</span>
      <span class="insight-count">missed ${r.wrong}×</span>
    </div>`).join('') : '<p style="text-align:center;color:var(--muted);">Nothing tricky yet!</p>';

  app.innerHTML = `
    <div class="screen">
    <button class="back-btn" id="insightsBackBtn" type="button">← Back</button>
    <h1>🏫 Class Insights</h1>
    <div class="subtitle">The words and facts students find trickiest, across everyone who's practised on this device</div>

    <label>📖 Trickiest Spelling Words</label>
    <div class="insight-list">${listHtml(spellingRows)}</div>

    <label>🔢 Trickiest Number Facts</label>
    <div class="insight-list">${listHtml(timesRows)}</div>

    <label>✍️ Trickiest Punctuation &amp; Capitals</label>
    <div class="insight-list">${listHtml(punctRows)}</div>
    </div>
  `;
  document.getElementById('insightsBackBtn').addEventListener('click', renderHome);
}
